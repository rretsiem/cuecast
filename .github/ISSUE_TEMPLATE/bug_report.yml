name: Bug report
description: Report a reproducible problem in Cuecast
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands when possible.
      placeholder: |
        1. Run `./cuecast ...`
        2. Wait for ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version
      description: A commit SHA, tag, or local version note

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - macOS 13
        - macOS 14
        - macOS 15
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Redact private stream URLs, station names, and local paths before posting.
      render: shell
