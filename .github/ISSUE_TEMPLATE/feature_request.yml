name: Feature request
description: Propose an improvement to Cuecast
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is missing or painful today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true

  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Note any expected complexity, compatibility, or UX concerns.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Redact private stream URLs, station names, and local paths before posting.
