name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Build release binary
        run: swift build -c release

      - name: Verify CLI help
        run: swift run cuecast --help
